name: todo-today-harvest

# Daily harvest of todo.today/ubud — the richest Ubud event aggregator.
# Runs a stealthed headless Chromium (full browser, unrestricted egress, no
# 10-60s Vercel limit), pulls the site's own JSON API, ICP-filters, and POSTs
# the survivors to /api/cron/curator-ingest under the 'todo-today' source. They
# land as `pending` for the daily routine to triage.
#
# Why GH Actions and not the Vercel cron: the harvest needs a real browser
# (Cloudflare bypass) and the ingest is heavy per-event — exactly what blows the
# Vercel function timeout. GH runners have neither constraint.

on:
  schedule:
    - cron: '30 18 * * *' # 02:30 WITA daily — after the 01:00 adapter sweep, before the morning routine
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: todo-today-harvest
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps + Playwright Chromium
        run: |
          npm ci --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Harvest ToDo.Today -> payload
        id: harvest
        run: |
          set -euo pipefail
          node scripts/scrape/todo-today-harvest.mjs --out /tmp/payload.json
          COUNT=$(jq '.events | length' /tmp/payload.json)
          DATE=$(jq -r '.date' /tmp/payload.json)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "::notice::ToDo.Today harvested $COUNT ICP events for $DATE"

      - name: POST to curator-ingest (chunked)
        if: steps.harvest.outputs.count != '0'
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          INGEST_URL: https://theubudian.life/api/cron/curator-ingest
        run: |
          set -uo pipefail
          # Chunk into batches of 10: a single all-events POST 504s the route's 60s
          # per-event geocode budget once the approved set is large.
          TOTAL=$(jq '.events | length' /tmp/payload.json)
          DATE=$(jq -r '.date' /tmp/payload.json)
          ING=0; DUP=0; FAIL=0; i=0
          while [ "$i" -lt "$TOTAL" ]; do
            jq -c --argjson i "$i" --arg d "$DATE" \
              '{date:$d, source:"todo-today", events:(.events[$i:($i+10)])}' /tmp/payload.json > /tmp/chunk.json
            RESP=$(curl -fsS --max-time 90 -X POST \
              -H "Authorization: Bearer $CRON_SECRET" -H "Content-Type: application/json" \
              -d @/tmp/chunk.json "$INGEST_URL" || echo '{}')
            ING=$((ING + $(echo "$RESP" | jq -r '.ingested // 0')))
            DUP=$((DUP + $(echo "$RESP" | jq -r '.duplicates // 0')))
            FAIL=$((FAIL + $(echo "$RESP" | jq -r '.failed // 0')))
            i=$((i + 10))
          done
          echo "::notice::ToDo.Today ingested $ING ($DUP duplicates, $FAIL failed) of $TOTAL"
