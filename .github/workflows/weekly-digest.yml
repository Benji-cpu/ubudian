name: weekly-digest

on:
  schedule:
    # 23:06 UTC Tuesday = 07:06 WITA Wednesday — the digest lands with
    # Wednesday-morning coffee in Bali. Off-minute dodges the on-the-hour
    # GH Actions cron pile-up.
    - cron: "6 23 * * 2"
  workflow_dispatch: {}

concurrency:
  group: weekly-digest
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger digest send
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          response=$(curl -fsS -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "https://theubudian.life/api/cron/weekly-digest")
          echo "Response: ${response}"
