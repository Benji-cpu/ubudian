name: curator-ingest

# Triggered whenever the daily-curator agent (see .claude/agents/daily-curator.md)
# commits a new inbox payload to main. Reads the JSON, POSTs it to the curator
# ingestion route on Vercel, which pipes each event through the existing
# createEventFromParsed() pipeline.
#
# This is the second leg of the git-as-bus pattern: the Claude trigger sandbox
# can't reach theubudian.life directly (Anthropic egress allowlist), but GH
# runners have unrestricted egress.

on:
  push:
    branches: [main]
    paths:
      - 'curator/inbox/**'
  workflow_dispatch:
    inputs:
      date:
        description: 'Inbox date (YYYY-MM-DD). Defaults to today (Bali time).'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: curator-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find inbox payload to ingest
        id: payload
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE="${{ github.event.inputs.date }}"
          else
            # On a push, use the lexicographically-greatest (= newest date)
            # inbox file. ls -t can't be trusted on a fresh git checkout: every
            # file has the same mtime, so the fallback ordering is unstable
            # and in practice ended up picking the oldest file — see commits
            # 2026-05-18..2026-05-21, all of which processed 2026-05-19.json.
            DATE=$(ls -1 curator/inbox/*.json 2>/dev/null | sort | tail -1 | sed -E 's|.*/([0-9]{4}-[0-9]{2}-[0-9]{2})\.json|\1|')
          fi

          if [ -z "$DATE" ] || [ ! -f "curator/inbox/${DATE}.json" ]; then
            echo "No inbox payload found — exiting cleanly."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "path=curator/inbox/${DATE}.json" >> "$GITHUB_OUTPUT"
          echo "Ingesting $DATE"

      - name: POST to curator-ingest route
        if: steps.payload.outputs.skip != 'true'
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DATE: ${{ steps.payload.outputs.date }}
          PAYLOAD_PATH: ${{ steps.payload.outputs.path }}
        run: |
          set -euo pipefail

          # The inbox file is { date, events[] }. The route accepts the same
          # shape, so we can pass it through directly.
          BODY=$(jq -c --arg date "$DATE" '{ date: $date, events: .events }' "$PAYLOAD_PATH")

          RESPONSE=$(curl -fsS -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            "https://theubudian.life/api/cron/curator-ingest")

          echo "$RESPONSE" | jq .

          INGESTED=$(echo "$RESPONSE" | jq -r '.ingested // 0')
          DUPES=$(echo "$RESPONSE" | jq -r '.duplicates // 0')
          FAILED=$(echo "$RESPONSE" | jq -r '.failed // 0')
          echo "::notice::Curator ingested $INGESTED events ($DUPES duplicates, $FAILED failed) for $DATE"
