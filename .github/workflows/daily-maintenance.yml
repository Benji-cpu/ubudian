# Nightly call to /api/cron/daily-maintenance.
#
# Runs at 19:17 UTC daily, which is 03:17 Bali time (WITA, UTC+8). This puts
# the digest email in Benji's inbox before the workday and well outside any
# active hours. Off-minute (17) avoids the global :00 fleet pile-up.
#
# Plan B for the daily-maintenance plan: Vercel Hobby caps cron jobs at 2
# (already used by ingest-events and ingestion-health), and the claude.ai
# remote-trigger path needs a manually-configured environment_id we don't
# have yet. GitHub Actions runs free, no extra Vercel cron slot needed.
#
# Setup: Add CRON_SECRET as a repo secret (matching the same value Vercel
# already has). Then this just works.

name: daily-maintenance

on:
  schedule:
    - cron: "17 19 * * *"
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  call-maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit /api/cron/daily-maintenance with digest=true
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret is not set on this repository"
            exit 1
          fi

          response=$(mktemp)
          status=$(curl -sS -w "%{http_code}" -o "$response" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://ubudian-v1.vercel.app/api/cron/daily-maintenance?digest=true")

          echo "HTTP $status"
          cat "$response"
          echo

          if [ "$status" != "200" ]; then
            echo "::error::Maintenance endpoint returned $status"
            exit 1
          fi

          # Surface a tiny summary in the Actions UI for at-a-glance review.
          {
            echo "## Daily maintenance"
            echo "\`\`\`json"
            cat "$response" | head -c 4000
            echo
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
