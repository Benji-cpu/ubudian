name: event-reminders

on:
  schedule:
    # 09:04 UTC = 17:04 WITA — early evening Bali time, the day before the
    # event ("starts tomorrow" framing). Off-minute dodges the on-the-hour
    # GH Actions cron pile-up.
    - cron: "4 9 * * *"
  workflow_dispatch: {}

concurrency:
  group: event-reminders
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger reminder send
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          response=$(curl -fsS -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "https://theubudian.life/api/cron/event-reminders")
          echo "Response: ${response}"
